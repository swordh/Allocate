# Firebase App Hosting configuration
# Docs: https://firebase.google.com/docs/app-hosting/configure
#
# NEXT_PUBLIC_FIREBASE_* and NEXT_PUBLIC_APP_URL are NOT hardcoded here —
# they differ per environment (alpha/beta/prod) and are set per-backend via:
#   firebase --project <id> apphosting:config:set KEY="value"

runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  # Public Firebase client config — set per-backend, needed at build time.
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_APP_URL
    availability:
      - BUILD
      - RUNTIME

  # Stripe price IDs — non-secret, runtime only.
  - variable: STRIPE_PRICE_STARTER_MONTHLY
    value: "price_1Q0r0X06TtFrNVu39VXac7MQ"
    availability:
      - RUNTIME
  - variable: STRIPE_PRICE_STARTER_YEARLY
    value: "price_1Q0N5206TtFrNVu3B1rlpJYi"
    availability:
      - RUNTIME

  # Secrets — managed in Google Secret Manager.
  # Create with: firebase apphosting:secrets:set <NAME>
  - variable: FIREBASE_ADMIN_SERVICE_ACCOUNT_JSON
    secret: FIREBASE_ADMIN_SERVICE_ACCOUNT_JSON
    availability:
      - RUNTIME
  - variable: STRIPE_SECRET_KEY
    secret: STRIPE_SECRET_KEY
    availability:
      - RUNTIME
  - variable: STRIPE_WEBHOOK_SECRET
    secret: STRIPE_WEBHOOK_SECRET
    availability:
      - RUNTIME
