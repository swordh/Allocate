# Firebase App Hosting configuration
# Docs: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  # Public Firebase client config — needed at build time so it ends up in the client bundle.
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyDlmC62B2RS-zO_YseqbcOs4gpzKaiVd-A"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "allocate-e0735.firebaseapp.com"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "allocate-e0735"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "allocate-e0735.firebasestorage.app"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "5366151572"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:5366151572:web:f63b276838880215053781"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    value: "G-02WW3DDDPD"
    availability:
      - BUILD
      - RUNTIME

  # Stripe price IDs — non-secret, runtime only. Replace placeholders with real price IDs from Stripe Dashboard before enabling checkout.
  - variable: STRIPE_PRICE_STARTER_MONTHLY
    value: "price_1Q0r0X06TtFrNVu39VXac7MQ"
    availability:
      - RUNTIME
  - variable: STRIPE_PRICE_STARTER_YEARLY
    value: "price_1Q0N5206TtFrNVu3B1rlpJYi"
    availability:
      - RUNTIME

  # Secrets — managed in Google Secret Manager.
  # Create with: firebase apphosting:secrets:set <NAME>
  - variable: FIREBASE_ADMIN_SERVICE_ACCOUNT_JSON
    secret: FIREBASE_ADMIN_SERVICE_ACCOUNT_JSON
    availability:
      - RUNTIME
  - variable: STRIPE_SECRET_KEY
    secret: STRIPE_SECRET_KEY
    availability:
      - RUNTIME
  - variable: STRIPE_WEBHOOK_SECRET
    secret: STRIPE_WEBHOOK_SECRET
    availability:
      - RUNTIME
