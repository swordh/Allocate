# Firebase App Hosting — base configuration (all backends)
# Environment-specific values live in apphosting.<env>.yaml files:
#   apphosting.alpha.yaml    → alpha backend (environment = "alpha")
#   apphosting.beta.yaml     → beta backend  (environment = "beta")
#   apphosting.allocate.yaml → prod backend  (environment = "allocate")
# Docs: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  # Secrets — resolved from each backend's own Google Secret Manager project
  - variable: FIREBASE_ADMIN_SERVICE_ACCOUNT_JSON
    secret: FIREBASE_ADMIN_SERVICE_ACCOUNT_JSON
    availability:
      - RUNTIME
  - variable: STRIPE_SECRET_KEY
    secret: STRIPE_SECRET_KEY
    availability:
      - RUNTIME
  - variable: STRIPE_WEBHOOK_SECRET
    secret: STRIPE_WEBHOOK_SECRET
    availability:
      - RUNTIME
