# Firebase App Hosting — BETA environment
# Activate: Firebase Console → App Hosting → beta backend → Settings → Environment = "beta"
# Merges with apphosting.yaml (base). Values here take precedence.
# Docs: https://firebase.google.com/docs/app-hosting/multiple-environments

runConfig:
  maxInstances: 2

env:
  - variable: NEXT_PUBLIC_APP_ENV
    value: "beta"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_APP_URL
    value: "https://allocate-beta--allocate-beta.europe-west4.hosted.app"
    availability:
      - BUILD
      - RUNTIME

  # Firebase client config — allocate-beta project
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyA0JWI-YZunY8SoVP3KQhVr9BiWov1ZlCQ"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "allocate-beta.firebaseapp.com"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "allocate-beta"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "allocate-beta.firebasestorage.app"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "905640958810"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:905640958810:web:f6cc419e5287d3cd94b163"
    availability:
      - BUILD
      - RUNTIME

  # Stripe — test mode
  - variable: STRIPE_PRICE_STARTER_MONTHLY
    value: "price_1Q0r0X06TtFrNVu39VXac7MQ"
    availability:
      - RUNTIME
  - variable: STRIPE_PRICE_STARTER_YEARLY
    value: "price_1Q0N5206TtFrNVu3B1rlpJYi"
    availability:
      - RUNTIME
