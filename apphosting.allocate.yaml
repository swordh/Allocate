# Firebase App Hosting — PRODUCTION environment
# Activate: Firebase Console → App Hosting → prod backend → Settings → Environment = "allocate"
# Merges with apphosting.yaml (base). Values here take precedence.
# Docs: https://firebase.google.com/docs/app-hosting/multiple-environments

