<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allocate — Create Account</title>
<style>
  @font-face {
    font-family: 'General Sans';
    src: url('../public/fonts/GeneralSans-Variable.woff2') format('woff2-variations');
    font-weight: 100 900;
    font-style: normal;
    font-display: swap;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #080808;
    --white: #F0EDE8;
    --dim: #2A2A2A;
    --mid: #4A4A4A;
    --rule: #161616;
    --accent: #EECC02;
    --repair: #cc3333;
  }
  body {
    font-family: 'General Sans', system-ui, sans-serif;
    background: var(--black);
    color: var(--white);
    font-size: 16px;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .proto-bar {
    background: #111;
    padding: 8px 16px;
    font-size: 11px;
    color: #666;
    border-bottom: 1px solid #1a1a1a;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .proto-bar a { color: #666; text-decoration: none; }
  .proto-bar a:hover { color: var(--white); }
  .proto-bar a.active { color: var(--accent); }
  .center-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
  }
  .auth-box {
    width: 100%;
    max-width: 440px;
  }
  .logo {
    font-size: clamp(64px, 10vw, 108px);
    font-weight: 700;
    letter-spacing: -0.04em;
    line-height: 0.88;
    margin-bottom: 8px;
  }
  .sub {
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--mid);
    margin-bottom: 64px;
  }
  .form-group {
    margin-bottom: 0;
    border-bottom: 1px solid var(--rule);
  }
  .form-group:first-of-type {
    border-top: 1px solid var(--rule);
  }
  .form-group label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--mid);
    padding: 16px 0 4px;
  }
  .form-group input {
    display: block;
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--white);
    font-family: 'General Sans', system-ui, sans-serif;
    font-size: 20px;
    font-weight: 400;
    padding: 4px 0 16px;
    caret-color: var(--accent);
  }
  .form-group input::placeholder { color: var(--dim); }
  .btn-primary {
    display: block;
    width: 100%;
    background: var(--accent);
    color: var(--black);
    border: none;
    padding: 18px 24px;
    font-family: 'General Sans', system-ui, sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 32px;
  }
  .btn-primary:hover { background: #d4b500; }
  .auth-link {
    display: block;
    text-align: center;
    margin-top: 24px;
    font-size: 14px;
    color: var(--mid);
    text-decoration: none;
  }
  .auth-link:hover { color: var(--white); }
  .trial-hint {
    margin-top: 20px;
    text-align: center;
    font-size: 13px;
    color: var(--mid);
  }
</style>
</head>
<body>
<div class="proto-bar">
  <a href="index.html">← Back to index</a>
  <a href="login.html">login</a>
  <a href="signup.html" class="active">signup</a>
  <a href="trial-started.html">trial-started</a>
  <a href="bookings.html">bookings</a>
  <a href="bookings-week.html">week</a>
  <a href="bookings-month.html">month</a>
  <a href="equipment.html">equipment</a>
  <a href="booking-new.html">new-booking</a>
  <a href="booking-detail.html">booking-detail</a>
  <a href="settings-company.html">settings-company</a>
  <a href="settings-team.html">settings-team</a>
  <a href="settings-subscription.html">settings-subscription</a>
</div>
<div class="center-wrap">
  <div class="auth-box">
    <div class="logo">ALLOCATE</div>
    <div class="sub">Gear Management System</div>
    <div class="form-group">
      <label for="company">Company Name</label>
      <input type="text" id="company" placeholder="Nordic Film Productions" autocomplete="organization">
    </div>
    <div class="form-group">
      <label for="name">Your Name</label>
      <input type="text" id="name" placeholder="Erik Lindström" autocomplete="name">
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@studio.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="new-password">
    </div>
    <button class="btn-primary">Create Account</button>
    <div class="trial-hint">You'll start a 14-day free trial — no credit card required.</div>
    <a href="login.html" class="auth-link">Already have an account →</a>
  </div>
</div>
</body>
</html>
