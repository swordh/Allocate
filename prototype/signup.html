<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ALLOCATE — Create Account</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  @import url('https://fonts.cdnfonts.com/css/general-sans');
  body { font-family: 'General Sans', sans-serif; background-color: #080808; color: #FFFFFF; -webkit-font-smoothing: antialiased; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #080808; }
  ::-webkit-scrollbar-thumb { background: #474747; }
</style>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#ffffff",
          "primary-container": "#d4d4d4",
          "secondary": "#F0EDE8",
          "tertiary": "#EECC02",
          "error": "#ffb4ab",
          "background": "#080808",
          "surface": "#080808",
          "surface-container-lowest": "#0E0E0E",
          "surface-container-low": "#1C1B1B",
          "surface-container": "#201f1f",
          "surface-container-high": "#262525",
          "surface-container-highest": "#353534",
          "on-surface": "#FFFFFF",
          "on-surface-variant": "#c6c6c6",
          "outline": "#919191",
          "outline-variant": "#474747",
          "tertiary-container": "#a88f00",
          "error-container": "#93000a",
          "on-primary": "#1a1c1c",
          "on-secondary": "#1c1c19",
          "on-tertiary": "#221b00",
          "on-background": "#e5e2e1",
          "surface-variant": "#353534",
          "inverse-surface": "#e5e2e1",
          "surface-bright": "#3a3939",
        },
        fontFamily: {
          "headline": ["General Sans", "sans-serif"],
          "body": ["General Sans", "sans-serif"],
          "label": ["General Sans", "sans-serif"]
        },
        borderRadius: {"DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px"},
      },
    },
  }
</script>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">

<!-- Proto bar -->
<div style="background:#111;padding:8px 16px;font-size:11px;color:#666;border-bottom:1px solid #1a1a1a;display:flex;gap:16px;flex-wrap:wrap;font-family:monospace;">
  <a href="index.html" style="color:#666;text-decoration:none;">← index</a>
  <a href="login.html" style="color:#666;text-decoration:none;">login</a>
  <a href="signup.html" style="color:#EECC02;text-decoration:none;">signup</a>
  <a href="trial-started.html" style="color:#666;text-decoration:none;">trial-started</a>
  <a href="bookings.html" style="color:#666;text-decoration:none;">bookings</a>
  <a href="bookings-week.html" style="color:#666;text-decoration:none;">week</a>
  <a href="bookings-month.html" style="color:#666;text-decoration:none;">month</a>
  <a href="equipment.html" style="color:#666;text-decoration:none;">equipment</a>
  <a href="booking-new.html" style="color:#666;text-decoration:none;">new-booking</a>
  <a href="booking-detail.html" style="color:#666;text-decoration:none;">booking-detail</a>
  <a href="settings-company.html" style="color:#666;text-decoration:none;">settings-company</a>
  <a href="settings-team.html" style="color:#666;text-decoration:none;">settings-team</a>
  <a href="settings-subscription.html" style="color:#666;text-decoration:none;">settings-subscription</a>
</div>

<div class="flex-1 flex flex-col items-center justify-center px-6 py-12">
  <div class="w-full max-w-sm">
    <div class="font-black tracking-tighter text-white uppercase text-5xl mb-2">ALLOCATE</div>
    <div class="text-[10px] font-bold uppercase tracking-widest text-outline mb-16">Gear Management System</div>

    <!-- Error state — shown when something goes wrong -->
    <!-- <div class="border border-error/40 bg-error/10 text-error text-sm px-4 py-3 mb-6">An account with this email already exists.</div> -->

    <!-- Company Name -->
    <div class="border-t border-outline-variant/30">
      <label class="block text-[10px] font-bold uppercase tracking-widest text-outline pt-4 pb-1" for="companyName">Company Name</label>
      <div class="border-b border-outline-variant/30">
        <input type="text" id="companyName" class="block w-full bg-transparent border-none outline-none text-white text-xl font-medium pb-4 caret-tertiary" placeholder="Nordic Film Productions" autocomplete="organization" maxlength="100" style="caret-color:#EECC02;">
      </div>
    </div>

    <!-- Your Name -->
    <div class="border-b border-outline-variant/30">
      <label class="block text-[10px] font-bold uppercase tracking-widest text-outline pt-4 pb-1" for="userName">Your Name</label>
      <input type="text" id="userName" class="block w-full bg-transparent border-none outline-none text-white text-xl font-medium pb-4 caret-tertiary" placeholder="Erik Lindström" autocomplete="name" maxlength="100" style="caret-color:#EECC02;">
    </div>

    <!-- Email -->
    <div class="border-b border-outline-variant/30">
      <label class="block text-[10px] font-bold uppercase tracking-widest text-outline pt-4 pb-1" for="email">Email</label>
      <input type="email" id="email" class="block w-full bg-transparent border-none outline-none text-white text-xl font-medium pb-4 caret-tertiary" placeholder="you@studio.com" autocomplete="email" style="caret-color:#EECC02;">
    </div>

    <!-- Password -->
    <div class="border-b border-outline-variant/30">
      <label class="block text-[10px] font-bold uppercase tracking-widest text-outline pt-4 pb-1" for="password">
        Password
        <span class="text-[9px] font-bold uppercase tracking-widest text-outline/40 ml-1">(min 8 characters)</span>
      </label>
      <input type="password" id="password" class="block w-full bg-transparent border-none outline-none text-white text-xl font-medium pb-4 caret-tertiary" placeholder="••••••••" autocomplete="new-password" style="caret-color:#EECC02;">
    </div>

    <p class="mt-6 text-center text-xs text-outline leading-relaxed">By creating an account you agree to our <a href="#" class="underline hover:text-white transition-colors">Terms of Service</a> and acknowledge our <a href="#" class="underline hover:text-white transition-colors">Privacy Policy</a>.</p>

    <button class="block w-full bg-tertiary text-on-tertiary mt-6 py-4 text-xs font-bold tracking-widest uppercase hover:bg-tertiary-container transition-colors">CREATE ACCOUNT</button>
    <a href="login.html" class="block text-center mt-6 text-sm text-outline hover:text-white transition-colors">Already have an account →</a>
  </div>
</div>

</body>
</html>
