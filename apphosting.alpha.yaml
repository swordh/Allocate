# Firebase App Hosting — ALPHA environment
# Activate: Firebase Console → App Hosting → alpha backend → Settings → Environment = "alpha"
# Merges with apphosting.yaml (base). Values here take precedence.
# Docs: https://firebase.google.com/docs/app-hosting/multiple-environments

runConfig:
  maxInstances: 2

env:
  - variable: NEXT_PUBLIC_APP_ENV
    value: "alpha"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_APP_URL
    value: "https://allocate-alpha--allocate-alpha.europe-west4.hosted.app"
    availability:
      - BUILD
      - RUNTIME

  # Firebase client config — allocate-alpha project
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyCxvUqvlF6uszTbsktJsmbikFAsulKlw8k"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "allocate-alpha.firebaseapp.com"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "allocate-alpha"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "allocate-alpha.firebasestorage.app"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "484998289231"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:484998289231:web:59c527ee62b0ae03cdd73a"
    availability:
      - BUILD
      - RUNTIME

  # Stripe — test mode
  - variable: STRIPE_PRICE_STARTER_MONTHLY
    value: "price_1Q0r0X06TtFrNVu39VXac7MQ"
    availability:
      - RUNTIME
  - variable: STRIPE_PRICE_STARTER_YEARLY
    value: "price_1Q0N5206TtFrNVu3B1rlpJYi"
    availability:
      - RUNTIME
